<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Disney">
<meta name="theme-color" content="#0B0A12">
<title>Disneyland</title>
<style>
  :root{
    --gold:#F4C84B;--gold-soft:#FFE08A;--violet:#9B7BFF;--ink:#0B0A12;
    --txt:#F5F5F7;--txt-dim:#9A9AA6;--glass:rgba(255,255,255,.07);
    --glass-strong:rgba(255,255,255,.11);--hair:rgba(255,255,255,.14);
    --danger:#FF5C5C;--r:22px;
    --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
    color:var(--txt);background:var(--ink);overflow-x:hidden;-webkit-font-smoothing:antialiased;}
  .bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(120% 90% at 50% -10%, #1B1530 0%, #0B0A12 55%, #08070E 100%);}
  .orb{position:fixed;z-index:-1;border-radius:50%;filter:blur(70px);pointer-events:none;}
  .orb.gold{width:55vw;height:55vw;background:var(--gold);top:-12vw;right:-18vw;opacity:.30;}
  .orb.violet{width:60vw;height:60vw;background:var(--violet);top:32vh;left:-22vw;opacity:.28;}
  .orb.blue{width:50vw;height:50vw;background:#3D7BFF;bottom:-18vw;right:-12vw;opacity:.20;}
  .app{max-width:560px;margin:0 auto;padding:calc(var(--safe-t) + 14px) 18px calc(var(--safe-b) + 120px);}

  header{display:flex;align-items:flex-end;justify-content:space-between;margin:8px 2px 18px;}
  h1{font-size:38px;line-height:1;font-weight:800;letter-spacing:-.02em;margin:0;
    font-family:ui-rounded,-apple-system,system-ui,sans-serif;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;}
  .head-actions{display:flex;gap:8px;}
  .icon-btn{width:42px;height:42px;border-radius:50%;color:var(--txt);
    background:var(--glass-strong);backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);border:1px solid var(--hair);
    font-size:17px;display:grid;place-items:center;transition:transform .12s,background .2s;}
  .icon-btn:active{transform:scale(.9);}
  .icon-btn.on{background:var(--gold);color:#1a1500;border-color:transparent;font-weight:700;}

  .glass{position:relative;background:var(--glass);backdrop-filter:blur(22px) saturate(180%);
    -webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid var(--hair);
    border-radius:var(--r);box-shadow:0 8px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.18);
    overflow:hidden;}
  .glass::before{content:"";position:absolute;left:0;right:0;top:0;height:42%;
    background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,0));pointer-events:none;}

  .hero{padding:22px 22px 20px;margin-bottom:24px;text-align:center;}
  .hero .label{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-soft);font-weight:700;}
  .hero .count{font-family:ui-rounded,-apple-system,system-ui,sans-serif;font-size:84px;line-height:.95;
    font-weight:800;letter-spacing:-.04em;margin:6px 0 2px;text-shadow:0 0 40px rgba(244,200,75,.35);}
  .hero .note{color:var(--txt-dim);font-size:14px;margin:2px 0 16px;min-height:18px;border:none;
    background:transparent;text-align:center;width:100%;font-family:inherit;outline:none;}
  .hero .note::placeholder{color:rgba(154,154,166,.6);}
  .stepper{display:flex;gap:12px;justify-content:center;}
  .step{width:62px;height:48px;border-radius:16px;border:1px solid var(--hair);background:var(--glass-strong);
    color:var(--txt);font-size:26px;font-weight:600;display:grid;place-items:center;transition:transform .1s,background .2s;}
  .step:active{transform:scale(.88);}
  .step.plus{background:var(--gold);color:#1a1500;border-color:transparent;}

  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin:28px 4px 12px;}
  .section-head:first-of-type{margin-top:0;}
  .section-head h2{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt-dim);font-weight:700;margin:0;}
  .sort-btn{background:none;border:none;color:var(--gold);font-size:14px;font-weight:600;padding:4px;}
  .sort-btn:active{opacity:.6;}

  ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:center;gap:12px;padding:12px 14px;}
  .rank{min-width:26px;text-align:center;font-size:13px;font-weight:700;color:var(--txt-dim);font-variant-numeric:tabular-nums;}
  .name{flex:1;font-size:17px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .name-input{flex:1;font-size:17px;font-weight:600;background:rgba(0,0,0,.25);color:var(--txt);
    border:1px solid var(--gold);border-radius:10px;padding:6px 10px;font-family:inherit;outline:none;}
  .score{font-family:ui-rounded,-apple-system,system-ui,sans-serif;font-size:22px;font-weight:800;
    min-width:46px;text-align:right;color:var(--gold-soft);font-variant-numeric:tabular-nums;transition:transform .14s;}
  .score.bump{transform:scale(1.35);}
  .ctrls{display:flex;gap:8px;}
  .mini{width:40px;height:40px;border-radius:13px;border:1px solid var(--hair);background:var(--glass-strong);
    color:var(--txt);font-size:21px;font-weight:600;display:grid;place-items:center;transition:transform .1s,background .2s;flex:none;}
  .mini:active{transform:scale(.85);}
  .mini.plus{background:var(--gold);color:#1a1500;border-color:transparent;}
  .trash{background:rgba(255,92,92,.16);color:var(--danger);border-color:rgba(255,92,92,.3);}

  /* Commentaires */
  .crow{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;}
  .ctext{flex:1;font-size:15px;line-height:1.45;white-space:pre-wrap;word-break:break-word;}
  .ctext-input{flex:1;background:rgba(0,0,0,.25);color:var(--txt);border:1px solid var(--gold);
    border-radius:10px;padding:8px 10px;font-family:inherit;font-size:15px;line-height:1.45;outline:none;resize:vertical;min-height:60px;}

  .empty{text-align:center;color:var(--txt-dim);padding:34px 20px;font-size:15px;}

  /* Récap / diagramme */
  .recap{padding:20px;}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
  .stat{background:rgba(255,255,255,.05);border:1px solid var(--hair);border-radius:16px;padding:12px 14px;}
  .stat .v{font-family:ui-rounded,-apple-system,system-ui,sans-serif;font-size:28px;font-weight:800;color:var(--gold-soft);line-height:1;}
  .stat .k{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt-dim);font-weight:700;margin-top:5px;}
  .bars{display:flex;flex-direction:column;gap:10px;}
  .bar .top{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-bottom:5px;gap:10px;}
  .bar .bn{color:var(--txt);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar .bv{color:var(--gold-soft);font-weight:800;font-variant-numeric:tabular-nums;flex:none;}
  .track{height:10px;border-radius:6px;background:rgba(255,255,255,.06);overflow:hidden;}
  .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--gold),var(--gold-soft));
    box-shadow:0 0 12px rgba(244,200,75,.4);transition:width .5s cubic-bezier(.2,.9,.3,1);}

  .fab{position:fixed;right:22px;bottom:calc(var(--safe-b) + 24px);width:62px;height:62px;border-radius:50%;
    border:none;background:var(--gold);color:#1a1500;font-size:34px;font-weight:300;
    box-shadow:0 10px 30px rgba(244,200,75,.45);display:grid;place-items:center;transition:transform .12s;z-index:30;}
  .fab:active{transform:scale(.9);}

  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;display:none;align-items:flex-end;
    justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
  .sheet-bg.show{display:flex;}
  .sheet{width:100%;max-width:560px;margin:0 10px calc(var(--safe-b) + 10px);background:rgba(28,26,40,.85);
    backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
    border:1px solid var(--hair);border-radius:28px;padding:22px;
    box-shadow:0 -10px 50px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.15);
    animation:rise .28s cubic-bezier(.2,.9,.3,1);}
  @keyframes rise{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet h3{margin:0 0 16px;font-size:20px;font-weight:800;letter-spacing:-.01em;}
  .seg{display:flex;background:rgba(0,0,0,.3);border:1px solid var(--hair);border-radius:14px;padding:4px;margin-bottom:18px;}
  .seg button{flex:1;border:none;background:transparent;color:var(--txt-dim);font-weight:700;padding:11px;
    border-radius:10px;font-family:inherit;font-size:15px;transition:.2s;}
  .seg button.active{background:var(--gold);color:#1a1500;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-dim);margin-bottom:6px;font-weight:700;}
  .field input,.field textarea{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--hair);border-radius:14px;
    color:var(--txt);font-size:17px;padding:13px 14px;font-family:inherit;outline:none;}
  .field input:focus,.field textarea:focus{border-color:var(--gold);}
  .field textarea{resize:vertical;min-height:90px;font-size:15px;line-height:1.5;}
  #exportBox,#importBox{font-size:13px;}
  .sheet-btns{display:flex;gap:10px;margin-top:6px;}
  .btn{flex:1;padding:14px;border-radius:16px;border:none;font-size:16px;font-weight:700;font-family:inherit;transition:transform .1s;}
  .btn:active{transform:scale(.96);}
  .btn.primary{background:var(--gold);color:#1a1500;}
  .btn.ghost{background:var(--glass-strong);color:var(--txt);border:1px solid var(--hair);}
  .hint{font-size:12.5px;color:var(--txt-dim);line-height:1.5;margin:2px 0 14px;}
  .toast{position:fixed;left:50%;bottom:calc(var(--safe-b) + 100px);transform:translateX(-50%) translateY(20px);
    background:rgba(28,26,40,.95);border:1px solid var(--hair);color:var(--txt);padding:11px 20px;border-radius:30px;
    font-size:14px;font-weight:600;z-index:60;opacity:0;transition:.25s;pointer-events:none;backdrop-filter:blur(20px);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  *:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="orb gold"></div><div class="orb violet"></div><div class="orb blue"></div>

<div class="app">
  <header>
    <h1>Disneyland</h1>
    <div class="head-actions">
      <button class="icon-btn" id="editBtn" aria-label="Modifier">&#9998;</button>
      <button class="icon-btn" id="saveBtn" aria-label="Sauvegarde">&#8645;</button>
    </div>
  </header>

  <div class="glass hero">
    <div class="label">Visites</div>
    <div class="count" id="visitCount">0</div>
    <input class="note" id="visitNote" placeholder="ajoute une note (ex : 1 CE - 3 fraude)">
    <div class="stepper">
      <button class="step" id="visitMinus" aria-label="Retirer une visite">&minus;</button>
      <button class="step plus" id="visitPlus" aria-label="Ajouter une visite">+</button>
    </div>
  </div>

  <div class="section-head">
    <h2>Attractions</h2>
    <button class="sort-btn" id="sortBtn">Trier par score</button>
  </div>
  <ul id="list"></ul>

  <div class="section-head"><h2>Commentaires</h2></div>
  <ul id="comments"></ul>

  <div class="section-head"><h2>Récap</h2></div>
  <div class="glass recap">
    <div class="stats" id="stats"></div>
    <div class="bars" id="bars"></div>
  </div>
</div>

<button class="fab" id="fab" aria-label="Ajouter">+</button>

<div class="sheet-bg" id="addSheet">
  <div class="sheet">
    <h3>Ajouter</h3>
    <div class="seg">
      <button id="segRide" class="active">Attraction</button>
      <button id="segComment">Commentaire</button>
    </div>
    <div id="rideFields">
      <div class="field"><label>Nom</label><input id="addName" placeholder="ex : Crush" autocomplete="off"></div>
      <div class="field"><label>Score de depart</label><input id="addCount" type="number" inputmode="numeric" value="0"></div>
    </div>
    <div id="commentFields" style="display:none;">
      <div class="field"><label>Commentaire</label><textarea id="addComment" placeholder="ex : Illumination - Ariel, Star Wars..."></textarea></div>
    </div>
    <div class="sheet-btns">
      <button class="btn ghost" id="addCancel">Annuler</button>
      <button class="btn primary" id="addOk">Ajouter</button>
    </div>
  </div>
</div>

<div class="sheet-bg" id="saveSheet">
  <div class="sheet">
    <h3>Sauvegarde</h3>
    <p class="hint">Copie ce texte et garde-le quelque part. Pour restaurer : colle-le ci-dessous et touche Restaurer.</p>
    <div class="field"><label>Ta sauvegarde</label><textarea id="exportBox" readonly></textarea></div>
    <div class="sheet-btns" style="margin-bottom:18px;">
      <button class="btn ghost" id="saveClose">Fermer</button>
      <button class="btn primary" id="copyBtn">Copier</button>
    </div>
    <div class="field"><label>Restaurer depuis un texte</label><textarea id="importBox" placeholder="colle ta sauvegarde ici"></textarea></div>
    <div class="sheet-btns"><button class="btn primary" id="importBtn">Restaurer</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const KEY = "disney-tracker-v1";

const SEED = {
  visits: 61,
  note: "pass - 1 CE - 3 fraude",
  rides: [
    {id:"r1", name:"Flight Force", count:150},
    {id:"r2", name:"Hyperspace Mountain", count:55},
    {id:"r3", name:"WEB", count:45},
    {id:"r4", name:"Crush", count:35},
    {id:"r5", name:"RC Racer", count:32},
    {id:"r6", name:"Ratatouille", count:31},
    {id:"r7", name:"Indiana Jones", count:19},
    {id:"r8", name:"Hollywood Tower", count:16},
    {id:"r9", name:"Star Tours", count:14},
    {id:"r10", name:"Train de la mine", count:13},
    {id:"r11", name:"Manoir", count:12},
    {id:"r12", name:"Pirates des Caraibes", count:11},
    {id:"r13", name:"Road Trip Cars", count:9},
    {id:"r14", name:"Buzz", count:7},
    {id:"r15", name:"Frozen Ever After", count:7},
    {id:"r16", name:"It's a Small World", count:6},
    {id:"r17", name:"Soldiers", count:6},
    {id:"r18", name:"Autopia", count:3},
    {id:"r19", name:"Orbitron", count:2},
    {id:"r20", name:"Zigzag", count:2},
    {id:"r21", name:"Peter Pan", count:2},
    {id:"r22", name:"Pays des contes de fees", count:2},
    {id:"r23", name:"Train du cirque", count:2},
    {id:"r24", name:"Railroad", count:1},
    {id:"r25", name:"Molly Brown (bateau)", count:1},
    {id:"r26", name:"Cars Rally", count:1},
    {id:"r27", name:"Tasse", count:1},
    {id:"r28", name:"Blanche Neige", count:1}
  ],
  comments: [
    {id:"c1", text:"Illumination : Ariel, Pirate des Caraibes, Star Wars et Reine des neiges"},
    {id:"c2", text:"DisneyDream : Chandelle, Aladin, Notre-Dame, Raiponce"},
    {id:"c3", text:"Intense pas vrai ? On fait pas les choses a moitie ici, continue Friday"}
  ]
};

let state = load();
let editMode = false;

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){
      const s = JSON.parse(raw);
      if(typeof s.visits !== "number") s.visits = 0;
      if(!Array.isArray(s.rides)) s.rides = [];
      if(!Array.isArray(s.comments)) s.comments = [];
      return s;
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
function save(){
  state.updated = Date.now();
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
}

const $ = s => document.querySelector(s);
const listEl = $("#list"), commentsEl = $("#comments");

function render(){
  $("#visitCount").textContent = state.visits;
  const noteEl = $("#visitNote");
  if(document.activeElement !== noteEl) noteEl.value = state.note || "";
  $("#editBtn").classList.toggle("on", editMode);
  renderRides();
  renderComments();
  renderChart();
}

function renderRides(){
  listEl.innerHTML = "";
  if(!state.rides.length){
    listEl.innerHTML = '<li class="empty">Aucune attraction.<br>Touche + pour en ajouter une.</li>';
    return;
  }
  state.rides.forEach((ride, i) => {
    const li = document.createElement("li");
    li.className = "glass row";
    if(editMode){
      li.innerHTML = '<button class="mini trash" aria-label="Supprimer">&#128465;</button>'+
        '<input class="name-input"><span class="score">'+ride.count+'</span>';
      li.querySelector(".name-input").value = ride.name;
      li.querySelector(".trash").onclick = () => removeRide(ride.id);
      const ni = li.querySelector(".name-input");
      ni.onchange = () => { ride.name = ni.value.trim() || ride.name; save(); renderChart(); };
    } else {
      li.innerHTML = '<span class="rank">'+(i+1)+'</span><span class="name"></span>'+
        '<span class="score">'+ride.count+'</span>'+
        '<div class="ctrls"><button class="mini" aria-label="Retirer">&minus;</button>'+
        '<button class="mini plus" aria-label="Ajouter">+</button></div>';
      li.querySelector(".name").textContent = ride.name;
      const btns = li.querySelectorAll(".mini");
      const scoreEl = li.querySelector(".score");
      btns[0].onclick = () => changeRide(ride.id, -1, scoreEl);
      btns[1].onclick = () => changeRide(ride.id, +1, scoreEl);
    }
    listEl.appendChild(li);
  });
}

function renderComments(){
  commentsEl.innerHTML = "";
  if(!state.comments.length){
    commentsEl.innerHTML = '<li class="empty">Aucun commentaire.<br>Touche + puis "Commentaire".</li>';
    return;
  }
  state.comments.forEach(c => {
    const li = document.createElement("li");
    li.className = "glass crow";
    if(editMode){
      li.innerHTML = '<button class="mini trash" aria-label="Supprimer">&#128465;</button><textarea class="ctext-input"></textarea>';
      const ta = li.querySelector(".ctext-input");
      ta.value = c.text;
      ta.onchange = () => { c.text = ta.value.trim() || c.text; save(); };
      li.querySelector(".trash").onclick = () => removeComment(c.id);
    } else {
      li.innerHTML = '<span class="ctext"></span>';
      li.querySelector(".ctext").textContent = c.text;
    }
    commentsEl.appendChild(li);
  });
}

function renderChart(){
  const sum = state.rides.reduce((a,r)=>a+r.count,0);
  const top = state.rides.reduce((m,r)=>r.count>m.count?r:m,{name:"-",count:0});
  const perVisit = state.visits>0 ? (sum/state.visits).toFixed(1) : "-";
  $("#stats").innerHTML =
    stat(sum,"Tours totaux") + stat(state.visits,"Visites") +
    stat(state.rides.length,"Attractions") + stat(perVisit,"Tours / visite");

  const sorted = [...state.rides].sort((a,b)=>b.count-a.count);
  const max = Math.max(1, ...sorted.map(r=>r.count));
  $("#bars").innerHTML = sorted.map(r=>{
    const w = Math.max(2, Math.round(r.count/max*100));
    return '<div class="bar"><div class="top"><span class="bn">'+esc(r.name)+
      '</span><span class="bv">'+r.count+'</span></div>'+
      '<div class="track"><div class="fill" style="width:'+w+'%"></div></div></div>';
  }).join("");
}
function stat(v,k){ return '<div class="stat"><div class="v">'+v+'</div><div class="k">'+k+'</div></div>'; }
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function changeRide(id, d, scoreEl){
  const r = state.rides.find(x=>x.id===id); if(!r) return;
  r.count = Math.max(0, r.count + d);
  if(scoreEl){ scoreEl.textContent = r.count; scoreEl.classList.remove("bump"); void scoreEl.offsetWidth; scoreEl.classList.add("bump"); }
  save(); renderChart();
}
function removeRide(id){
  const r = state.rides.find(x=>x.id===id);
  if(r && confirm('Supprimer "'+r.name+'" ? Son score sera perdu.')){
    state.rides = state.rides.filter(x=>x.id!==id); save(); render();
  }
}
function removeComment(id){
  if(confirm("Supprimer ce commentaire ?")){
    state.comments = state.comments.filter(x=>x.id!==id); save(); render();
  }
}

$("#visitPlus").onclick = () => { state.visits++; $("#visitCount").textContent = state.visits; save(); renderChart(); };
$("#visitMinus").onclick = () => { state.visits = Math.max(0, state.visits-1); $("#visitCount").textContent = state.visits; save(); renderChart(); };
$("#visitNote").oninput = e => { state.note = e.target.value; save(); };

$("#editBtn").onclick = () => { editMode = !editMode; render(); };
$("#sortBtn").onclick = () => { state.rides.sort((a,b)=>b.count-a.count); save(); render(); toast("Trie par score"); };

// Ajout avec choix attraction / commentaire
const addSheet = $("#addSheet");
let addMode = "ride";
function setAddMode(m){
  addMode = m;
  $("#segRide").classList.toggle("active", m==="ride");
  $("#segComment").classList.toggle("active", m==="comment");
  $("#rideFields").style.display = m==="ride" ? "" : "none";
  $("#commentFields").style.display = m==="comment" ? "" : "none";
}
$("#segRide").onclick = () => setAddMode("ride");
$("#segComment").onclick = () => setAddMode("comment");
$("#fab").onclick = () => {
  $("#addName").value=""; $("#addCount").value="0"; $("#addComment").value="";
  setAddMode("ride"); addSheet.classList.add("show"); setTimeout(()=>$("#addName").focus(),100);
};
$("#addCancel").onclick = () => addSheet.classList.remove("show");
$("#addOk").onclick = () => {
  if(addMode==="ride"){
    const name = $("#addName").value.trim();
    if(!name){ $("#addName").focus(); return; }
    const count = Math.max(0, parseInt($("#addCount").value,10) || 0);
    state.rides.push({ id:"r"+Date.now(), name, count });
    toast("Attraction ajoutee");
  } else {
    const text = $("#addComment").value.trim();
    if(!text){ $("#addComment").focus(); return; }
    state.comments.push({ id:"c"+Date.now(), text });
    toast("Commentaire ajoute");
  }
  save(); render(); addSheet.classList.remove("show");
};

const saveSheet = $("#saveSheet");
$("#saveBtn").onclick = () => { $("#exportBox").value = JSON.stringify(state); $("#importBox").value=""; saveSheet.classList.add("show"); };
$("#saveClose").onclick = () => saveSheet.classList.remove("show");
$("#copyBtn").onclick = async () => {
  const t = $("#exportBox").value;
  try{ await navigator.clipboard.writeText(t); toast("Copie"); }
  catch(e){ $("#exportBox").select(); document.execCommand("copy"); toast("Copie"); }
};
$("#importBtn").onclick = () => {
  try{
    const data = JSON.parse($("#importBox").value.trim());
    if(typeof data.visits !== "number" || !Array.isArray(data.rides)) throw 0;
    if(!Array.isArray(data.comments)) data.comments = [];
    state = data; save(); render(); saveSheet.classList.remove("show"); toast("Restaure");
  }catch(e){ toast("Sauvegarde invalide"); }
};

[addSheet, saveSheet].forEach(bg => bg.onclick = e => { if(e.target===bg) bg.classList.remove("show"); });

let toastT;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1600); }

render();
</script>
</body>
</html>
